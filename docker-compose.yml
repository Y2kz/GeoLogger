version: '3.8'

services:
  geologger-server:
    container_name: geologger-server
    build:
      context: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - JWT_SECRET=change_this_secret_in_production
      - DB_PATH=/app/data/geologger.sqlite
      - PORT=3000
    restart: always

# Persistent data is stored in the ./data directory in the project root.
